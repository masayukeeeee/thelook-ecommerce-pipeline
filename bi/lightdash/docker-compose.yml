services:
  lightdash:
    image: lightdash/lightdash:latest
    platform: linux/amd64
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ../../dbt/thelook:/usr/app/dbt
    environment:
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET}

      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-postgres}

      PORT: 8080
      SITE_URL: http://localhost:8080
      SECURE_COOKIES: "false"
      TRUST_PROXY: "false"
      ALLOW_MULTIPLE_ORGS: "false"
      SCHEDULER_ENABLED: "true"
      AI_COPILOT_ENABLED: "false"
      AI_EMBEDDING_ENABLED: "false"

      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: lightdash
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
  db:
    image: pgvector/pgvector:pg15
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO to be ready..."
          sleep 1
        done
        /usr/bin/mc mb --ignore-existing local/lightdash
        /usr/bin/mc anonymous set download local/lightdash || true
        echo "minio bucket initialized"
volumes:
  db-data:
  minio-data:
